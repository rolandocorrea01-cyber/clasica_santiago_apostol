<script>
var map = L.map('map').setView([8.15132,-81.12838], 11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap · © CartoDB', maxZoom:19}).addTo(map);
L.control.scale({imperial:false,metric:true,position:'bottomleft'}).addTo(map);

var COLORES = {80:'#E67E22', 60:'#16A085'};
var capas = {};      // capa de línea + flechas por ruta
var rutaActiva = 80; // solo una ruta a la vez
var posMarker = null; // marcador de posición en el mapa al recorrer altimetría

function agregarFlechas(coords, color, grupo){
  var n=coords.length, paso=Math.max(1,Math.floor(n/16));
  for(var i=paso;i<n-1;i+=paso){
    var a=coords[i-1],b=coords[i];
    var dLat=b[0]-a[0],dLng=b[1]-a[1];
    var ang=Math.atan2(-dLat,dLng*Math.cos(a[0]*Math.PI/180))*180/Math.PI;
    var fl=L.divIcon({className:'',html:'<div style="color:'+color+';font-size:13px;transform:rotate('+ang+'deg);text-shadow:0 0 3px #fff,0 0 3px #fff">➤</div>',iconSize:[13,13],iconAnchor:[6,6]});
    L.marker(b,{icon:fl,interactive:false}).addTo(grupo);
  }
}

function dibujarRuta(km){
  var d = km===80 ? DATOS.ruta80 : DATOS.ruta60;
  var coords = d.coords.map(function(x){return[x[1],x[0]];});
  var grupo = L.layerGroup().addTo(map);
  var linea = L.polyline(coords,{color:COLORES[km],weight:5,opacity:0.9}).addTo(grupo);
  linea.on('click',function(){ mostrarAltimetria(km); });
  agregarFlechas(coords, COLORES[km], grupo);
  capas[km] = {grupo:grupo, coords:coords, bounds:linea.getBounds()};
}

dibujarRuta(80);
dibujarRuta(60);
// Inicio: solo Elite (80) visible
map.removeLayer(capas[60].grupo);
document.getElementById('tog60').classList.remove('activa');
document.getElementById('tog60').querySelector('.check').textContent='⬜';

// Puntos de referencia
PUNTOS_CIC.features.forEach(function(feat){
  var p=feat.properties, c=feat.geometry.coordinates;
  var emoji=p.EMOJI||'📍';
  var esPrecaucion = (p.SUBCATEGORIA||'').indexOf('precaución')!==-1;
  var borde = esPrecaucion ? '#E74C3C' : '#E67E22';
  var tam = esPrecaucion ? 30 : 26;
  var ico=L.divIcon({className:'',html:'<div style="width:'+tam+'px;height:'+tam+'px;border-radius:50%;background:#fff;border:2.5px solid '+borde+';display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 5px rgba(0,0,0,0.3)">'+emoji+'</div>',iconSize:[tam,tam],iconAnchor:[tam/2,tam/2]});
  L.marker([c[1],c[0]],{icon:ico}).addTo(map)
    .bindPopup('<div class="pt">'+emoji+' '+p.NOMBRE+'</div><div class="pr">'+(p.OBSERVACIONES||'')+'</div>',{maxWidth:260});
});

function toggleRuta(km){
  // Modo exclusivo: solo una ruta activa a la vez
  if(rutaActiva === km) return; // ya está activa, no hacer nada
  // Ocultar la ruta anterior
  [80,60].forEach(function(k){
    var tog = document.getElementById('tog'+k);
    if(k === km){
      map.addLayer(capas[k].grupo);
      tog.classList.add('activa');
      tog.querySelector('.check').textContent='✅';
    } else {
      map.removeLayer(capas[k].grupo);
      tog.classList.remove('activa');
      tog.querySelector('.check').textContent='⬜';
    }
  });
  rutaActiva = km;
  mostrarAltimetria(km);
  ajustarVista();
}

function ajustarVista(){
  if(capas[rutaActiva]){
    map.fitBounds(capas[rutaActiva].bounds.pad(0.1));
  }
}

// ── ALTIMETRÍA ──
function mostrarAltimetria(km){
  var d = km===80 ? DATOS.ruta80 : DATOS.ruta60;
  var perfil = d.perfil;
  var puntosClave = d.puntos_clave;
  var svg = document.getElementById('alti-svg');
  var W=1000, H=210, padTop=64, padBot=26;

  var kms = perfil.map(function(p){return p[0];});
  var eles = perfil.map(function(p){return p[1];});
  var maxKm = Math.max.apply(null,kms), minEle=Math.min.apply(null,eles), maxEle=Math.max.apply(null,eles);
  var rangoEle = Math.max(maxEle-minEle, 30);
  // Desnivel positivo acumulado con suavizado (elimina ruido GPS)
  var suave = [];
  var ventana = 5;
  for(var si=0; si<eles.length; si++){
    var ini=Math.max(0,si-2), fin=Math.min(eles.length,si+3), sum=0, cnt=0;
    for(var sj=ini; sj<fin; sj++){ sum+=eles[sj]; cnt++; }
    suave.push(sum/cnt);
  }
  var desnivelPos = 0, refEle = suave[0], umbral = 3;
  for(var di=1; di<suave.length; di++){
    if(suave[di] - refEle > umbral){ desnivelPos += suave[di]-refEle; refEle = suave[di]; }
    else if(suave[di] < refEle){ refEle = suave[di]; }
  }

  var offsetX = 30; function x(k){ return offsetX + (k/maxKm)*(W-2*offsetX); }
  function y(e){ return H-padBot - ((e-minEle)/rangoEle)*(H-padTop-padBot); }

  // Área del perfil (relleno degradado)
  var path='M'+offsetX+','+H;
  perfil.forEach(function(p){ path += ' L'+x(p[0]).toFixed(1)+','+y(p[1]).toFixed(1); });
  path += ' L'+(W-offsetX)+','+H+' Z';

  var svgContent = '<defs><linearGradient id="grad'+km+'" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0%" stop-color="'+COLORES[km]+'" stop-opacity="0.55"/>'+
    '<stop offset="100%" stop-color="'+COLORES[km]+'" stop-opacity="0.08"/></linearGradient></defs>';
  svgContent += '<path d="'+path+'" fill="url(#grad'+km+')" stroke="'+COLORES[km]+'" stroke-width="2"/>';

  // ZONA SALIDA CONTROLADA (km 0 a 5.6): sombreado distinto con rayas diagonales
  var kmControlada = 5.6;
  var xCtrlIni = x(0), xCtrlFin = x(kmControlada);
  svgContent += '<defs><pattern id="rayasCtrl'+km+'" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">'+
    '<rect width="8" height="8" fill="#F39C12" fill-opacity="0.10"/>'+
    '<line x1="0" y1="0" x2="0" y2="8" stroke="#E67E22" stroke-width="2" opacity="0.35"/></pattern></defs>';
  svgContent += '<rect x="'+xCtrlIni+'" y="'+padTop+'" width="'+(xCtrlFin-xCtrlIni)+'" height="'+(H-padBot-padTop)+'" fill="url(#rayasCtrl'+km+')"/>';
  svgContent += '<line x1="'+xCtrlFin+'" y1="'+padTop+'" x2="'+xCtrlFin+'" y2="'+(H-padBot)+'" stroke="#E67E22" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>';
  // Etiqueta pequeña "Salida controlada" dentro de la zona
  svgContent += '<text x="'+((xCtrlIni+xCtrlFin)/2)+'" y="'+(H-padBot-4)+'" text-anchor="middle" font-size="8" font-weight="700" fill="#B9770E" opacity="0.8">SALIDA CONTROLADA</text>';

  // Líneas de elevación de referencia
  for(var e=Math.ceil(minEle/50)*50; e<=maxEle; e+=50){
    svgContent += '<line x1="'+offsetX+'" y1="'+y(e)+'" x2="'+(W-offsetX)+'" y2="'+y(e)+'" stroke="#eee" stroke-width="1"/>';
    svgContent += '<text x="2" y="'+(y(e)-2)+'" font-size="11" fill="#999">'+e+'m</text>';
  }

  // Puntos clave: los principales muestran etiqueta; los de precaución solo ícono (nombre al tocar)
  var ultimasX = [];
  var ultimosKmX = [];
  puntosClave.forEach(function(pc, i){
    var px=x(pc.km), py=y(pc.ele);
    var esPrecaucion = (pc.tipo==='precaucion');
    var icono = pc.tipo==='montana'?'⛰️':(pc.tipo==='salida'?'🏁':(pc.tipo==='meta'?'🏁':(pc.tipo==='retorno'?'🔄':(pc.tipo==='controlada'?'🚦':(pc.tipo==='volante'?'🚩':(esPrecaucion?'⚠️':'📍'))))));

    // Línea vertical punteada (siempre)
    svgContent += '<line x1="'+px+'" y1="'+py+'" x2="'+px+'" y2="'+(H-padBot)+'" stroke="'+COLORES[km]+'" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>';
    svgContent += '<circle cx="'+px+'" cy="'+py+'" r="5.5" fill="'+COLORES[km]+'" stroke="#fff" stroke-width="2.5"/>';

    if(esPrecaucion){
      // Solo ícono, con área clicable que despliega el nombre al tocar.
      var yIco = py - 20;
      svgContent += '<g class="pc-precaucion" data-nombre="'+pc.nombre.replace(/"/g,"&quot;")+'" data-px="'+px+'" data-color="'+COLORES[km]+'" style="cursor:pointer">';
      svgContent += '<circle cx="'+px+'" cy="'+yIco+'" r="13" fill="#fff" fill-opacity="0.01"/>';
      svgContent += '<text x="'+px+'" y="'+(yIco+7)+'" text-anchor="middle" font-size="22">⚠️</text>';
      svgContent += '</g>';
    } else {
      // Puntos principales: etiqueta con nombre (escalonada)
      var anchoNombre = pc.nombre.length*5.5 + 12;
      var nx = Math.max(anchoNombre/2+2, Math.min(W-anchoNombre/2-2, px));
      var nivel = 0;
      ultimasX.forEach(function(u){
        if(Math.abs(u.x - nx) < (u.ancho/2 + anchoNombre/2 + 4)) nivel = Math.max(nivel, u.nivel+1);
      });
      if(nivel > 2) nivel = 0;
      ultimasX.push({x:nx, ancho:anchoNombre, nivel:nivel});
      var yNombre = 6 + nivel*18;
      svgContent += '<rect x="'+(nx-anchoNombre/2)+'" y="'+yNombre+'" width="'+anchoNombre+'" height="16" rx="8" fill="'+COLORES[km]+'"/>';
      svgContent += '<text x="'+nx+'" y="'+(yNombre+11.5)+'" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">'+pc.nombre+'</text>';
      var tamIco = (pc.tipo==='salida'||pc.tipo==='meta') ? 28 : 18;
      // Salida Controlada (semáforo), Llegada: suben el ícono junto a la etiqueta con línea guía
      // para no pegarse a las letras (controlada) ni tapar precauciones cercanas (meta).
      var subirIcono = (pc.tipo==='controlada' || pc.tipo==='meta' || nivel>0);
      var yIcono;
      if(subirIcono){
        yIcono = yNombre + 40;
        // Línea guía del ícono al punto en el perfil
        svgContent += '<line x1="'+px+'" y1="'+(yIcono+4)+'" x2="'+px+'" y2="'+(py-6)+'" stroke="'+COLORES[km]+'" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.55"/>';
      } else {
        yIcono = py - 16;
      }
      svgContent += '<text x="'+px+'" y="'+yIcono+'" text-anchor="middle" font-size="'+tamIco+'">'+icono+'</text>';
    }

    // km en la base (escalonado)
    var kmNivel = 0;
    ultimosKmX.forEach(function(u){
      if(Math.abs(u - px) < 32) kmNivel = (kmNivel===0)?1:0;
    });
    ultimosKmX.push(px);
    var yKm = (H-9) - kmNivel*12;
    svgContent += '<text x="'+px+'" y="'+yKm+'" text-anchor="middle" font-size="11" font-weight="600" fill="#333">'+pc.km+'km</text>';
  });

  // Línea guía vertical + marcador de bici en la altimetría
  svgContent += '<line id="alti-guia-linea" x1="0" y1="'+(padTop-4)+'" x2="0" y2="'+(H-padBot)+'" stroke="#E74C3C" stroke-width="2" opacity="0" style="pointer-events:none"/>';
  svgContent += '<text id="alti-guia-bici" x="0" y="'+(H-padBot-4)+'" text-anchor="middle" font-size="24" opacity="0" style="pointer-events:none" transform="scale(1,1)">🚴</text>';
  svgContent += '<rect id="alti-guia-infobg" x="0" y="0" width="0" height="0" opacity="0" fill="#E74C3C" rx="4" style="pointer-events:none"/>';
  svgContent += '<text id="alti-guia-info" x="0" y="'+(padTop+6)+'" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" opacity="0" style="pointer-events:none"></text>';
  svg.innerHTML = svgContent;

  // Habilitar interacción de la guía
  habilitarGuiaAltimetria();
  // Habilitar tooltips de puntos de precaución
  habilitarTooltipsPrecaucion();

  document.getElementById('alti-titulo').textContent = km===80?'Perfil 80km — Elites/Juveniles':'Perfil 60km — Master/Prejuveniles';
  document.getElementById('alti-stats').textContent = ' · '+maxKm.toFixed(0)+'km · '+minEle.toFixed(0)+'-'+maxEle.toFixed(0)+'m · ↗ '+desnivelPos.toFixed(0)+'m desnivel positivo';
  // Guardar datos para la guía interactiva
  window._altiData = {km:km, perfil:perfil, coords:d.coords, maxKm:maxKm, minEle:minEle, rangoEle:rangoEle, W:W, H:H, padTop:padTop, padBot:padBot, offsetX:offsetX};

  document.getElementById('altimetria').classList.add('visible');
  document.getElementById('map').classList.add('con-alti');
  // panel siempre visible arriba
  setTimeout(function(){ map.invalidateSize(); }, 320);
}

function cerrarAlti(){
  document.getElementById('altimetria').classList.remove('visible');
  document.getElementById('map').classList.remove('con-alti');
  document.getElementById('panel').classList.remove('oculto-alti');
  setTimeout(function(){ map.invalidateSize(); }, 320);
}



// ── TOOLTIP de puntos de precaución (nombre al tocar el ⚠️) ──
function habilitarTooltipsPrecaucion(){
  var svg = document.getElementById('alti-svg');
  if(!svg) return;
  var grupos = svg.querySelectorAll('.pc-precaucion');
  grupos.forEach(function(g){
    function mostrar(){
      // Quitar tooltip previo
      var prev = svg.querySelector('#pc-tooltip'); if(prev) prev.remove();
      var px = parseFloat(g.getAttribute('data-px'));
      var nombre = g.getAttribute('data-nombre');
      var color = g.getAttribute('data-color');
      var ancho = nombre.length*6 + 16;
      var nx = Math.max(ancho/2+2, Math.min(1000-ancho/2-2, px));
      var ns = 'http://www.w3.org/2000/svg';
      var grp = document.createElementNS(ns,'g');
      grp.setAttribute('id','pc-tooltip');
      grp.innerHTML = '<rect x="'+(nx-ancho/2)+'" y="2" width="'+ancho+'" height="18" rx="9" fill="'+color+'"/>'+
        '<text x="'+nx+'" y="14.5" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">⚠️ '+nombre+'</text>'+
        '<line x1="'+nx+'" y1="20" x2="'+px+'" y2="34" stroke="'+color+'" stroke-width="1" opacity="0.5"/>';
      svg.appendChild(grp);
    }
    function ocultar(){ var t=svg.querySelector('#pc-tooltip'); if(t) setTimeout(function(){ if(t) t.remove(); }, 1500); }
    g.addEventListener('mouseenter', mostrar);
    g.addEventListener('mouseleave', ocultar);
    g.addEventListener('click', function(e){ e.stopPropagation(); mostrar(); ocultar(); });
    g.addEventListener('touchstart', function(e){ e.stopPropagation(); mostrar(); ocultar(); });
  });
}

// ── GUÍA INTERACTIVA: bici que se mueve por altimetría y mapa ──
var biciMapMarker = null;

function habilitarGuiaAltimetria(){
  var svg = document.getElementById('alti-svg');
  if(!svg) return;

  function moverGuia(clientX){
    var d = window._altiData;
    if(!d) return;
    var rect = svg.getBoundingClientRect();
    var pl = d.offsetX || 0;
    // Mapear la posición del cursor al área útil (con offset lateral)
    var fracPx = (clientX - rect.left) / rect.width * d.W; // posición en coords SVG
    var frac = (fracPx - pl) / (d.W - 2*pl);
    frac = Math.max(0, Math.min(1, frac));
    var kmActual = frac * d.maxKm;

    // Encontrar el punto del perfil más cercano a ese km
    var idx = 0, mejorDif = Infinity;
    for(var i=0;i<d.perfil.length;i++){
      var dif = Math.abs(d.perfil[i][0] - kmActual);
      if(dif < mejorDif){ mejorDif = dif; idx = i; }
    }
    var ele = d.perfil[idx][1];
    var kmReal = d.perfil[idx][0];

    // Posición X e Y en el SVG (con offset lateral)
    var offX = 30;
    var px = offX + (kmReal/d.maxKm) * (d.W - 2*offX);
    var py = d.H - d.padBot - ((ele-d.minEle)/d.rangoEle)*(d.H-d.padTop-d.padBot);

    // Actualizar línea guía y bici (la bici sigue la altura del perfil)
    var linea = document.getElementById('alti-guia-linea');
    var bici = document.getElementById('alti-guia-bici');
    var info = document.getElementById('alti-guia-info');
    var infobg = document.getElementById('alti-guia-infobg');
    if(linea){ linea.setAttribute('x1',px); linea.setAttribute('x2',px); linea.setAttribute('opacity','0.85'); }
    if(bici){
      bici.setAttribute('x',px); bici.setAttribute('y', py-8); bici.setAttribute('opacity','1');
      // En altimetría avanza a la derecha: voltear horizontalmente sobre su posición
      bici.setAttribute('transform', 'matrix(-1,0,0,1,'+(2*px)+',0)');
    }
    var txt = kmReal.toFixed(1)+'km · '+ele.toFixed(0)+'m';
    var ancho = txt.length*7 + 12;
    var ix = Math.max(ancho/2+2, Math.min(d.W-ancho/2-2, px));
    if(infobg){ infobg.setAttribute('x', ix-ancho/2); infobg.setAttribute('y', d.padTop-8); infobg.setAttribute('width', ancho); infobg.setAttribute('height', 17); infobg.setAttribute('opacity','0.95'); }
    if(info){ info.setAttribute('x',ix); info.setAttribute('y', d.padTop+4); info.setAttribute('opacity','1'); info.textContent = txt; }

    // Mover el marcador de bici en el MAPA con orientación según el recorrido
    if(d.coords && d.coords[idx]){
      var latlng = [d.coords[idx][1], d.coords[idx][0]];
      // Calcular dirección del movimiento (punto siguiente vs actual)
      var iNext = Math.min(idx+2, d.coords.length-1);
      var iPrev = Math.max(idx-2, 0);
      var a = d.coords[iPrev], b = d.coords[iNext];
      var dLng = b[0]-a[0];
      // Si avanza hacia el oeste (dLng negativo) la bici mira normal (izquierda→derecha por defecto va al este)
      // El emoji 🚴 apunta a la DERECHA (este). Si el recorrido va al OESTE, hay que voltearlo horizontalmente.
      var flip = (dLng > 0) ? 'scaleX(-1)' : 'scaleX(1)';
      var biciHtml = '<div style="font-size:26px;filter:drop-shadow(0 0 3px #fff) drop-shadow(0 0 3px #fff);transform:'+flip+'">🚴</div>';
      var icoBici = L.divIcon({className:'',html:biciHtml,iconSize:[26,26],iconAnchor:[13,13]});
      if(!biciMapMarker){
        biciMapMarker = L.marker(latlng,{icon:icoBici,interactive:false,zIndexOffset:1000}).addTo(map);
      } else {
        biciMapMarker.setLatLng(latlng);
        biciMapMarker.setIcon(icoBici);
        if(!map.hasLayer(biciMapMarker)) biciMapMarker.addTo(map);
      }
    }
  }

  function ocultarGuia(){
    ['alti-guia-linea','alti-guia-bici','alti-guia-info','alti-guia-infobg'].forEach(function(id){
      var el=document.getElementById(id); if(el) el.setAttribute('opacity','0');
    });
    if(biciMapMarker && map.hasLayer(biciMapMarker)) map.removeLayer(biciMapMarker);
  }

  // Mouse (PC)
  svg.onmousemove = function(e){ moverGuia(e.clientX); };
  svg.onmouseleave = function(){ ocultarGuia(); };
  // Touch (celular)
  svg.ontouchstart = svg.ontouchmove = function(e){
    e.preventDefault();
    if(e.touches && e.touches[0]) moverGuia(e.touches[0].clientX);
  };
  svg.ontouchend = function(){ ocultarGuia(); };
}

// Vista inicial: Elite (80) activa con su altimetría
mostrarAltimetria(80);
setTimeout(function(){ map.invalidateSize(); ajustarVista(); }, 400);
</script>
